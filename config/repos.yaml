defaults:
  release_limit: 10
  max_parallel: 3

repos:
  - id: ohmyzsh
    source:
      full_name: ohmyzsh/ohmyzsh
      private: false
    lfs: false
    release_limit: 1
    targets:
      gitee:
        enabled: false
      gitcode:
        enabled: true
        namespace: karanocave
        name: ohmyzsh
        visibility: public
        rewrite_readme_links: true
        sync_releases: true

  - id: ohmytmux
    source:
      full_name: gpakosz/.tmux
