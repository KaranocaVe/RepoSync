defaults:
  release_limit: 10
  max_parallel: 3

repos:
  - id: ohmyzsh
    source:
      full_name: ohmyzsh/ohmyzsh
      private: false
    lfs: false
    release_limit: 10
    targets:
      gitee:
        enabled: false
      gitcode:
        enabled: true
        namespace: karanocave
        name: ohmyzsh
        visibility: public
        sync_releases: true

